kind = "web"
previewPath = "/"
title = "Operator"
version = "1.0.0"
id = "artifacts/operator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22332

[services.development]
run = "pnpm --filter @workspace/operator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/operator", "run", "build" ]
publicDir = "artifacts/operator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22332"
BASE_PATH = "/"
