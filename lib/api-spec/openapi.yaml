openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification for Operator - personal life OS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: eod-reviews
    description: End-of-day review operations
  - name: pre-day-plans
    description: Pre-day plan operations
  - name: pre-week-plans
    description: Pre-week plan operations
  - name: operator
    description: Operator stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /eod-reviews:
    get:
      operationId: listEodReviews
      tags: [eod-reviews]
      summary: List all end-of-day reviews
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of end-of-day reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EodReview"
    post:
      operationId: createEodReview
      tags: [eod-reviews]
      summary: Create an end-of-day review with AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEodReviewBody"
      responses:
        "201":
          description: Created end-of-day review with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EodReview"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /eod-reviews/{id}:
    get:
      operationId: getEodReview
      tags: [eod-reviews]
      summary: Get a specific end-of-day review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: End-of-day review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EodReview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEodReview
      tags: [eod-reviews]
      summary: Delete an end-of-day review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pre-day-plans:
    get:
      operationId: listPreDayPlans
      tags: [pre-day-plans]
      summary: List all pre-day plans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of pre-day plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreDayPlan"
    post:
      operationId: createPreDayPlan
      tags: [pre-day-plans]
      summary: Create a pre-day plan with AI output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreDayPlanBody"
      responses:
        "201":
          description: Created pre-day plan with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreDayPlan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pre-day-plans/{id}:
    get:
      operationId: getPreDayPlan
      tags: [pre-day-plans]
      summary: Get a specific pre-day plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pre-day plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreDayPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreDayPlan
      tags: [pre-day-plans]
      summary: Delete a pre-day plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pre-week-plans:
    get:
      operationId: listPreWeekPlans
      tags: [pre-week-plans]
      summary: List all pre-week plans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of pre-week plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreWeekPlan"
    post:
      operationId: createPreWeekPlan
      tags: [pre-week-plans]
      summary: Create a pre-week plan with AI output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreWeekPlanBody"
      responses:
        "201":
          description: Created pre-week plan with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreWeekPlan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pre-week-plans/{id}:
    get:
      operationId: getPreWeekPlan
      tags: [pre-week-plans]
      summary: Get a specific pre-week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pre-week plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreWeekPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreWeekPlan
      tags: [pre-week-plans]
      summary: Delete a pre-week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /operator/stats:
    get:
      operationId: getOperatorStats
      tags: [operator]
      summary: Get overall stats summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    EodReview:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        sleepHours:
          type: ["number", "null"]
        sleepScore:
          type: ["integer", "null"]
        calories:
          type: ["integer", "null"]
        proteinG:
          type: ["number", "null"]
        carbsG:
          type: ["number", "null"]
        fatG:
          type: ["number", "null"]
        waterOz:
          type: ["number", "null"]
        steps:
          type: ["integer", "null"]
        workoutCompleted:
          type: ["boolean", "null"]
        workoutType:
          type: ["string", "null"]
        habitsCompleted:
          type: ["string", "null"]
        tasksPlanned:
          type: ["integer", "null"]
        tasksCompleted:
          type: ["integer", "null"]
        tasksMissed:
          type: ["integer", "null"]
        calendarCommitments:
          type: ["string", "null"]
        healthNotes:
          type: ["string", "null"]
        reflection:
          type: ["string", "null"]
        aiAnalysis:
          type: ["string", "null"]
        aiPlan:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - date
        - sleepHours
        - sleepScore
        - calories
        - proteinG
        - carbsG
        - fatG
        - waterOz
        - steps
        - workoutCompleted
        - workoutType
        - habitsCompleted
        - tasksPlanned
        - tasksCompleted
        - tasksMissed
        - calendarCommitments
        - healthNotes
        - reflection
        - aiAnalysis
        - aiPlan
        - createdAt

    CreateEodReviewBody:
      type: object
      properties:
        date:
          type: string
        sleepHours:
          type: number
        sleepScore:
          type: integer
        calories:
          type: integer
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
        waterOz:
          type: number
        steps:
          type: integer
        workoutCompleted:
          type: boolean
        workoutType:
          type: string
        habitsCompleted:
          type: string
        tasksPlanned:
          type: integer
        tasksCompleted:
          type: integer
        tasksMissed:
          type: integer
        calendarCommitments:
          type: string
        healthNotes:
          type: string
        reflection:
          type: string
      required:
        - date

    PreDayPlan:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        tasksPlanned:
          type: ["string", "null"]
        calendarCommitments:
          type: ["string", "null"]
        energyNote:
          type: ["string", "null"]
        aiPlan:
          type: ["string", "null"]
        aiContext:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - date
        - tasksPlanned
        - calendarCommitments
        - energyNote
        - aiPlan
        - aiContext
        - createdAt

    CreatePreDayPlanBody:
      type: object
      properties:
        date:
          type: string
        tasksPlanned:
          type: string
        calendarCommitments:
          type: string
        energyNote:
          type: string
      required:
        - date

    PreWeekPlan:
      type: object
      properties:
        id:
          type: integer
        weekStartDate:
          type: string
        goals:
          type: ["string", "null"]
        calendarCommitments:
          type: ["string", "null"]
        capacityNote:
          type: ["string", "null"]
        reflection:
          type: ["string", "null"]
        aiPlan:
          type: ["string", "null"]
        aiContext:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - weekStartDate
        - goals
        - calendarCommitments
        - capacityNote
        - reflection
        - aiPlan
        - aiContext
        - createdAt

    CreatePreWeekPlanBody:
      type: object
      properties:
        weekStartDate:
          type: string
        goals:
          type: string
        calendarCommitments:
          type: string
        capacityNote:
          type: string
        reflection:
          type: string
      required:
        - weekStartDate

    OperatorStats:
      type: object
      properties:
        totalEodReviews:
          type: integer
        totalDayPlans:
          type: integer
        totalWeekPlans:
          type: integer
        lastEodDate:
          type: ["string", "null"]
        lastDayPlanDate:
          type: ["string", "null"]
        lastWeekPlanDate:
          type: ["string", "null"]
        streakDays:
          type: integer
      required:
        - totalEodReviews
        - totalDayPlans
        - totalWeekPlans
        - lastEodDate
        - lastDayPlanDate
        - lastWeekPlanDate
        - streakDays
