openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification for Operator - personal life OS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: eod-reviews
    description: End-of-day review operations
  - name: pre-day-plans
    description: Pre-day plan operations
  - name: pre-week-plans
    description: Pre-week plan operations
  - name: daily-checkins
    description: Daily check-in operations
  - name: weekly-reviews
    description: Weekly review operations
  - name: operator-ai
    description: AI analysis and planning operations
  - name: metrics
    description: User-defined metrics management
  - name: metric-logs
    description: Daily metric log entries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /eod-reviews:
    get:
      operationId: listEodReviews
      tags: [eod-reviews]
      summary: List all end-of-day reviews
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of end-of-day reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EodReview"
    post:
      operationId: createEodReview
      tags: [eod-reviews]
      summary: Create an end-of-day review with AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEodReviewBody"
      responses:
        "201":
          description: Created end-of-day review with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EodReview"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /eod-reviews/{id}:
    get:
      operationId: getEodReview
      tags: [eod-reviews]
      summary: Get a specific end-of-day review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: End-of-day review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EodReview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEodReview
      tags: [eod-reviews]
      summary: Update an end-of-day review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEodReviewBody"
      responses:
        "200":
          description: Updated end-of-day review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EodReview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEodReview
      tags: [eod-reviews]
      summary: Delete an end-of-day review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pre-day-plans:
    get:
      operationId: listPreDayPlans
      tags: [pre-day-plans]
      summary: List all pre-day plans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of pre-day plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreDayPlan"
    post:
      operationId: createPreDayPlan
      tags: [pre-day-plans]
      summary: Create a pre-day plan with AI output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreDayPlanBody"
      responses:
        "201":
          description: Created pre-day plan with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreDayPlan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pre-day-plans/{id}:
    get:
      operationId: getPreDayPlan
      tags: [pre-day-plans]
      summary: Get a specific pre-day plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pre-day plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreDayPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePreDayPlan
      tags: [pre-day-plans]
      summary: Update a pre-day plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreDayPlanBody"
      responses:
        "200":
          description: Updated pre-day plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreDayPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreDayPlan
      tags: [pre-day-plans]
      summary: Delete a pre-day plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pre-week-plans:
    get:
      operationId: listPreWeekPlans
      tags: [pre-week-plans]
      summary: List all pre-week plans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of pre-week plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreWeekPlan"
    post:
      operationId: createPreWeekPlan
      tags: [pre-week-plans]
      summary: Create a pre-week plan with AI output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreWeekPlanBody"
      responses:
        "201":
          description: Created pre-week plan with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreWeekPlan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pre-week-plans/{id}:
    get:
      operationId: getPreWeekPlan
      tags: [pre-week-plans]
      summary: Get a specific pre-week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pre-week plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreWeekPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePreWeekPlan
      tags: [pre-week-plans]
      summary: Update a pre-week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreWeekPlanBody"
      responses:
        "200":
          description: Updated pre-week plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreWeekPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreWeekPlan
      tags: [pre-week-plans]
      summary: Delete a pre-week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /daily-checkins:
    get:
      operationId: listDailyCheckins
      tags: [daily-checkins]
      summary: List all daily check-ins
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of daily check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyCheckin"
    post:
      operationId: createDailyCheckin
      tags: [daily-checkins]
      summary: Create a daily check-in with AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyCheckinBody"
      responses:
        "201":
          description: Created daily check-in with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyCheckin"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /daily-checkins/{id}:
    get:
      operationId: getDailyCheckin
      tags: [daily-checkins]
      summary: Get a specific daily check-in
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Daily check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyCheckin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDailyCheckin
      tags: [daily-checkins]
      summary: Delete a daily check-in
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /weekly-reviews:
    get:
      operationId: listWeeklyReviews
      tags: [weekly-reviews]
      summary: List all weekly reviews
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of weekly reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyReview"
    post:
      operationId: createWeeklyReview
      tags: [weekly-reviews]
      summary: Create a weekly review with AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeeklyReviewBody"
      responses:
        "201":
          description: Created weekly review with AI outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReview"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weekly-reviews/{id}:
    get:
      operationId: getWeeklyReview
      tags: [weekly-reviews]
      summary: Get a specific weekly review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weekly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteWeeklyReview
      tags: [weekly-reviews]
      summary: Delete a weekly review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /metrics:
    get:
      operationId: listMetrics
      tags: [metrics]
      summary: List all active metrics
      responses:
        "200":
          description: List of metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Metric"
    post:
      operationId: createMetric
      tags: [metrics]
      summary: Create a new metric
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMetricBody"
      responses:
        "201":
          description: Created metric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metric"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /metrics/{id}:
    patch:
      operationId: updateMetric
      tags: [metrics]
      summary: Update a metric
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMetricBody"
      responses:
        "200":
          description: Updated metric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMetric
      tags: [metrics]
      summary: Delete a metric
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /metric-logs:
    get:
      operationId: listMetricLogs
      tags: [metric-logs]
      summary: Get metric logs for a specific date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of metric log entries with metric info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricLogEntry"
        "400":
          description: Missing date param
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveMetricLogs
      tags: [metric-logs]
      summary: Save metric log entries for a date (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMetricLogsBody"
      responses:
        "201":
          description: Saved log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricLog"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /operator/stats:
    get:
      operationId: getOperatorStats
      tags: [operator-ai]
      summary: Get overall stats summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorStats"

  /operator/trends:
    get:
      operationId: getOperatorTrends
      tags: [operator-ai]
      summary: Get recent metric trends (last 7 check-ins)
      responses:
        "200":
          description: Trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /operator/reflect:
    post:
      operationId: operatorReflect
      tags: [operator-ai]
      summary: Get a Claude reflection for a set of notes/metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectRequest"
      responses:
        "200":
          description: Claude reflection text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReflectResponse"
        "500":
          description: AI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /operator/plan:
    post:
      operationId: operatorPlan
      tags: [operator-ai]
      summary: Get an OpenAI tomorrow plan for a set of notes/metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanRequest"
      responses:
        "200":
          description: OpenAI plan text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanResponse"
        "500":
          description: AI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    EodReview:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        sleepHours:
          type: ["number", "null"]
        sleepScore:
          type: ["integer", "null"]
        calories:
          type: ["integer", "null"]
        proteinG:
          type: ["number", "null"]
        carbsG:
          type: ["number", "null"]
        fatG:
          type: ["number", "null"]
        waterOz:
          type: ["number", "null"]
        steps:
          type: ["integer", "null"]
        workoutCompleted:
          type: ["boolean", "null"]
        workoutType:
          type: ["string", "null"]
        habitsCompleted:
          type: ["string", "null"]
        tasksPlanned:
          type: ["integer", "null"]
        tasksCompleted:
          type: ["integer", "null"]
        tasksMissed:
          type: ["integer", "null"]
        calendarCommitments:
          type: ["string", "null"]
        healthNotes:
          type: ["string", "null"]
        reflection:
          type: ["string", "null"]
        aiAnalysis:
          type: ["string", "null"]
        aiPlan:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - date
        - sleepHours
        - sleepScore
        - calories
        - proteinG
        - carbsG
        - fatG
        - waterOz
        - steps
        - workoutCompleted
        - workoutType
        - habitsCompleted
        - tasksPlanned
        - tasksCompleted
        - tasksMissed
        - calendarCommitments
        - healthNotes
        - reflection
        - aiAnalysis
        - aiPlan
        - createdAt

    CreateEodReviewBody:
      type: object
      properties:
        date:
          type: string
        sleepHours:
          type: number
        sleepScore:
          type: integer
        calories:
          type: integer
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
        waterOz:
          type: number
        steps:
          type: integer
        workoutCompleted:
          type: boolean
        workoutType:
          type: string
        habitsCompleted:
          type: string
        tasksPlanned:
          type: integer
        tasksCompleted:
          type: integer
        tasksMissed:
          type: integer
        calendarCommitments:
          type: string
        healthNotes:
          type: string
        reflection:
          type: string
      required:
        - date

    UpdateEodReviewBody:
      type: object
      properties:
        date:
          type: string
        sleepHours:
          type: number
        sleepScore:
          type: integer
        calories:
          type: integer
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
        waterOz:
          type: number
        steps:
          type: integer
        workoutCompleted:
          type: boolean
        workoutType:
          type: string
        habitsCompleted:
          type: string
        tasksPlanned:
          type: integer
        tasksCompleted:
          type: integer
        tasksMissed:
          type: integer
        calendarCommitments:
          type: string
        healthNotes:
          type: string
        reflection:
          type: string

    PreDayPlan:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        tasksPlanned:
          type: ["string", "null"]
        calendarCommitments:
          type: ["string", "null"]
        energyNote:
          type: ["string", "null"]
        aiPlan:
          type: ["string", "null"]
        aiContext:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - date
        - tasksPlanned
        - calendarCommitments
        - energyNote
        - aiPlan
        - aiContext
        - createdAt

    CreatePreDayPlanBody:
      type: object
      properties:
        date:
          type: string
        tasksPlanned:
          type: string
        calendarCommitments:
          type: string
        energyNote:
          type: string
      required:
        - date

    UpdatePreDayPlanBody:
      type: object
      properties:
        date:
          type: string
        tasksPlanned:
          type: string
        calendarCommitments:
          type: string
        energyNote:
          type: string

    PreWeekPlan:
      type: object
      properties:
        id:
          type: integer
        weekStartDate:
          type: string
        goals:
          type: ["string", "null"]
        calendarCommitments:
          type: ["string", "null"]
        capacityNote:
          type: ["string", "null"]
        reflection:
          type: ["string", "null"]
        aiPlan:
          type: ["string", "null"]
        aiContext:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - weekStartDate
        - goals
        - calendarCommitments
        - capacityNote
        - reflection
        - aiPlan
        - aiContext
        - createdAt

    CreatePreWeekPlanBody:
      type: object
      properties:
        weekStartDate:
          type: string
        goals:
          type: string
        calendarCommitments:
          type: string
        capacityNote:
          type: string
        reflection:
          type: string
      required:
        - weekStartDate

    UpdatePreWeekPlanBody:
      type: object
      properties:
        weekStartDate:
          type: string
        goals:
          type: string
        calendarCommitments:
          type: string
        capacityNote:
          type: string
        reflection:
          type: string

    OperatorStats:
      type: object
      properties:
        totalCheckins:
          type: integer
        totalWeeklyReviews:
          type: integer
        avgEnergy:
          type: ["number", "null"]
        avgFocus:
          type: ["number", "null"]
        avgMood:
          type: ["number", "null"]
        avgSleep:
          type: ["number", "null"]
        avgHealth:
          type: ["number", "null"]
        lastCheckinDate:
          type: ["string", "null"]
        lastWeeklyReviewDate:
          type: ["string", "null"]
        streakDays:
          type: integer
      required:
        - totalCheckins
        - totalWeeklyReviews
        - avgEnergy
        - avgFocus
        - avgMood
        - avgSleep
        - avgHealth
        - lastCheckinDate
        - lastWeeklyReviewDate
        - streakDays

    DailyCheckin:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        notes:
          type: string
        energyLevel:
          type: integer
        focusLevel:
          type: integer
        healthLevel:
          type: integer
        sleepQuality:
          type: integer
        mood:
          type: integer
        tasksCompleted:
          type: string
        tasksMissed:
          type: string
        habitsCompleted:
          type: ["string", "null"]
        symptomsNotes:
          type: ["string", "null"]
        reflectionFeltGood:
          type: ["string", "null"]
        reflectionFeltOff:
          type: ["string", "null"]
        reflectionGotInWay:
          type: ["string", "null"]
        reflectionAnythingUnusual:
